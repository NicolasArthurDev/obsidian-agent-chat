name: Feature request
description: Suggest an idea or enhancement.
title: '[Feature]: '
labels: ['enhancement']
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem would this feature solve? What are you trying to do?
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposed solution
          description: Describe what you would like to happen.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Other approaches you have thought about.
      validations:
          required: false
